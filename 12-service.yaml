apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    # labels are used as selectors
    project: roboshop
    component: frontend
    environment: dev
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port
---
apiVersion: v1
kind: Pod
metadata:
  name: svc-test
  labels:
    project: roboshop
    component: frontend
    environment: dev
spec:
  containers:
  - name: almalinux
    image: almalinux:9
    command: ["sleep", "1000"]